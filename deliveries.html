<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CoreInventory - Deliveries</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
    header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
    main { padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #34495e; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    .btn { padding: 6px 12px; margin: 2px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-add { background: #27ae60; color: white; }
    .btn-edit { background: #2980b9; color: white; }
    .btn-delete { background: #c0392b; color: white; }
    form { margin-top: 20px; background: white; padding: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    form input { margin: 5px; padding: 8px; width: calc(100% - 20px); }
  </style>
</head>
<body>
  <header>
    <h1>CoreInventory - Deliveries</h1>
  </header>

  <main>
    <button class="btn btn-add" onclick="showForm()">+ New Delivery Order</button>

    <form id="deliveryForm" style="display:none;">
      <h3>Add / Edit Delivery Order</h3>
      <input type="hidden" id="deliveryId">
      <input type="text" id="customerName" placeholder="Customer Name" required>
      <input type="text" id="productName" placeholder="Product Name" required>
      <input type="number" id="quantity" placeholder="Quantity" required>
      <input type="date" id="deliveryDate" required>
      <button type="button" class="btn btn-add" onclick="saveDelivery()">Save</button>
      <button type="button" class="btn btn-delete" onclick="hideForm()">Cancel</button>
    </form>

    <table id="deliveryTable">
      <thead>
        <tr>
          <th>ID</th><th>Customer</th><th>Product</th><th>Quantity</th><th>Date</th><th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script>
    let deliveries = [
      { id: 1, customer: "ABC Corp", product: "Steel Rod", quantity: 100, date: "2026-03-15" },
      { id: 2, customer: "XYZ Ltd", product: "Office Chair", quantity: 20, date: "2026-03-18" }
    ];

    function renderTable() {
      const tbody = document.querySelector("#deliveryTable tbody");
      tbody.innerHTML = "";
      deliveries.forEach(d => {
        const row = `<tr>
          <td>${d.id}</td>
          <td>${d.customer}</td>
          <td>${d.product}</td>
          <td>${d.quantity}</td>
          <td>${d.date}</td>
          <td>
            <button class="btn btn-edit" onclick="editDelivery(${d.id})">Edit</button>
            <button class="btn btn-delete" onclick="deleteDelivery(${d.id})">Delete</button>
          </td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    function showForm() {
      document.getElementById("deliveryForm").style.display = "block";
    }

    function hideForm() {
      document.getElementById("deliveryForm").style.display = "none";
      clearForm();
    }

    function clearForm() {
      document.getElementById("deliveryId").value = "";
      document.getElementById("customerName").value = "";
      document.getElementById("productName").value = "";
      document.getElementById("quantity").value = "";
      document.getElementById("deliveryDate").value = "";
    }

    function saveDelivery() {
      const id = document.getElementById("deliveryId").value;
      const customer = document.getElementById("customerName").value;
      const product = document.getElementById("productName").value;
      const quantity = parseInt(document.getElementById("quantity").value);
      const date = document.getElementById("deliveryDate").value;

      if (id) {
        const delivery = deliveries.find(d => d.id == id);
        delivery.customer = customer;
        delivery.product = product;
        delivery.quantity = quantity;
        delivery.date = date;
      } else {
        const newId = deliveries.length ? deliveries[deliveries.length - 1].id + 1 : 1;
        deliveries.push({ id: newId, customer, product, quantity, date });
      }

      renderTable();
      hideForm();
    }

    function editDelivery(id) {
      const delivery = deliveries.find(d => d.id == id);
      document.getElementById("deliveryId").value = delivery.id;
      document.getElementById("customerName").value = delivery.customer;
      document.getElementById("productName").value = delivery.product;
      document.getElementById("quantity").value = delivery.quantity;
      document.getElementById("deliveryDate").value = delivery.date;
      showForm();
    }

    function deleteDelivery(id) {
      deliveries = deliveries.filter(d => d.id != id);
      renderTable();
    }

    // Initial render
    renderTable();
  </script>
</body>
</html>

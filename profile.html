<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CoreInventory - Profile</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
    header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
    nav { background: #34495e; padding: 10px; }
    nav a { color: white; margin-right: 15px; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    main { padding: 20px; max-width: 600px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card h3 { margin-top: 0; color: #2c3e50; }
    .profile-info { margin-bottom: 15px; }
    .profile-info label { display: block; font-weight: bold; margin-bottom: 5px; }
    .profile-info input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-save { background: #27ae60; color: white; }
    .btn-cancel { background: #c0392b; color: white; margin-left: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>CoreInventory - Profile</h1>
  </header>

  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="receipts.html">Receipts</a>
    <a href="deliveries.html">Delivery Orders</a>
    <a href="transfers.html">Internal Transfers</a>
    <a href="adjustments.html">Adjustments</a>
    <a href="profile.html">Profile</a>
    <a href="logout.html">Logout</a>
  </nav>

  <main>
    <div class="card">
      <h3>User Profile</h3>
      <form id="profileForm">
        <div class="profile-info">
          <label for="username">Username</label>
          <input type="text" id="username" value="warehouse_admin">
        </div>
        <div class="profile-info">
          <label for="email">Email</label>
          <input type="email" id="email" value="admin@coreinventory.com">
        </div>
        <div class="profile-info">
          <label for="role">Role</label>
          <input type="text" id="role" value="Administrator">
        </div>
        <div class="profile-info">
          <label for="password">Password</label>
          <input type="password" id="password" value="password123">
        </div>
        <button type="button" class="btn btn-save" onclick="saveProfile()">Save</button>
        <button type="reset" class="btn btn-cancel">Cancel</button>
      </form>
    </div>
  </main>

  <script>
    function saveProfile() {
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const role = document.getElementById("role").value;
      const password = document.getElementById("password").value;

      alert("Profile updated:\nUsername: " + username + "\nEmail: " + email + "\nRole: " + role);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adjustments</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 20px; }
    .adjust-card {
      background: white; padding: 20px; border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px;
      margin: auto;
    }
    h2 { color: #2c3e50; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, select, textarea {
      width: 100%; padding: 8px; margin-top: 5px;
      border: 1px solid #ccc; border-radius: 4px;
    }
    button {
      margin-top: 15px; padding: 10px 15px;
      background: #2c3e50; color: white; border: none;
      border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #1abc9c; }
    .adjust-log {
      margin-top: 20px; padding: 10px;
      background: #ecf0f1; border-radius: 4px;
    }
    .adjust-log ul { list-style: none; padding: 0; }
    .adjust-log li { margin: 5px 0; }
  </style>
</head>
<body>

  <div class="adjust-card">
    <h2>Stock Adjustment</h2>
    <form id="adjustForm">
      <label>Product:</label>
      <input type="text" id="product" required>

      <label>Quantity Change:</label>
      <input type="number" id="quantity" required>

      <label>Unit:</label>
      <select id="unit">
        <option>pcs</option>
        <option>kg</option>
        <option>liters</option>
      </select>

      <label>Reason:</label>
      <select id="reason">
        <option>Damaged</option>
        <option>Lost</option>
        <option>Miscount</option>
        <option>Other</option>
      </select>

      <label>Notes:</label>
      <textarea id="notes" rows="3"></textarea>

      <label>Date:</label>
      <input type="date" id="date" required>

      <button type="submit">Record Adjustment</button>
    </form>

    <div class="adjust-log">
      <h3>Adjustment Log</h3>
      <ul id="adjustList"></ul>
    </div>
  </div>

  <script>
    const form = document.getElementById("adjustForm");
    const adjustList = document.getElementById("adjustList");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const product = document.getElementById("product").value;
      const quantity = document.getElementById("quantity").value;
      const unit = document.getElementById("unit").value;
      const reason = document.getElementById("reason").value;
      const notes = document.getElementById("notes").value;
      const date = document.getElementById("date").value;

      const li = document.createElement("li");
      li.textContent = `${date}: Adjustment of ${quantity} ${unit} for ${product} (${reason}). Notes: ${notes}`;
      adjustList.appendChild(li);

      form.reset();
    });
  </script>

</body>
</html>

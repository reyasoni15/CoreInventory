<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - CoreInventory</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f6f9;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    nav {
      width: 220px;
      background: #34495e;
      color: white;
      position: fixed;
      top: 0; bottom: 0; left: 0;
      padding-top: 60px;
    }
    nav ul { list-style: none; padding: 0; }
    nav ul li { padding: 12px; }
    nav ul li a {
      color: white; text-decoration: none; display: block;
    }
    nav ul li a:hover { background: #3d566e; }
    main {
      margin-left: 240px; padding: 20px;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: white; padding: 20px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .card h3 { margin: 0; color: #2c3e50; }
    .card p { font-size: 24px; margin: 10px 0 0; color: #27ae60; }
    canvas {
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>CoreInventory Dashboard</h1>
  </header>

  <nav>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="receipts.html">Receipts</a></li>
      <li><a href="transfers.html">Internal Transfers</a></li>
      <li><a href="adjustments.html">Adjustments</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="logout.html">Logout</a></li>
    </ul>
  </nav>

  <main>
    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="card">
        <h3>Total Products</h3>
        <p>120</p>
      </div>
      <div class="card">
        <h3>Low Stock Items</h3>
        <p>8</p>
      </div>
      <div class="card">
        <h3>Pending Receipts</h3>
        <p>5</p>
      </div>
      <div class="card">
        <h3>Pending Deliveries</h3>
        <p>3</p>
      </div>
      <div class="card">
        <h3>Internal Transfers</h3>
        <p>2</p>
      </div>
      <div class="card">
        <h3>Adjustments</h3>
        <p>4</p>
      </div>
    </div>

    <!-- Charts -->
    <h2>Inventory Overview</h2>
    <canvas id="stockChart" width="400" height="200"></canvas>
    <h2>Monthly Activity</h2>
    <canvas id="activityChart" width="400" height="200"></canvas>
  </main>

  <script>
    // Stock distribution chart
    const stockCtx = document.getElementById('stockChart').getContext('2d');
    new Chart(stockCtx, {
      type: 'pie',
      data: {
        labels: ['Steel Rods', 'Chairs', 'Tables', 'Bold & Screws'],
        datasets: [{
          data: [120, 45, 30, 25],
          backgroundColor: ['#3498db', '#2ecc71', '#f1c40f', '#e74c3c', '#3498db', '#f4f6f9']
        }]
      }
    });

    // Monthly activity chart
    const activityCtx = document.getElementById('activityChart').getContext('2d');
    new Chart(activityCtx, {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
        datasets: [{
          label: 'Receipts',
          data: [30, 50, 40, 60, 70],
          backgroundColor: '#2ecc71'
        }, {
          label: 'Deliveries',
          data: [20, 40, 35, 50, 65],
          backgroundColor: '#e74c3c'
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>
</body>
</html>
